[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial*
upload_speed = 115200
monitor_speed = 115200
build_src_filter =
  +<*>
  -<led_strip_test.cpp>
lib_deps =
  adafruit/Adafruit SSD1306@^2.5.15
  adafruit/Adafruit NeoPixel@^1.12.5

[env:led_strip_test]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial*
upload_speed = 115200
monitor_speed = 115200
build_src_filter =
  +<led_strip_test.cpp>
lib_deps =
  adafruit/Adafruit NeoPixel@^1.12.5
